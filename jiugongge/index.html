<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九宫格切图</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div class="view flex-vertical">
        <header class="bar">九宫格切图-所见即所得</header>
        <section class="fc">
            <div class="left">
                <button type="button" id="drop-area">
                    <input type="file" id="file-input" style="display: none;" accept="image/*">
                    <span>上载图标</span>
                    <span>点击这里选择图片，或者拖入图片文件</span>
                </button>
                <button type="button" id="center-btn">图像居中</button>
                <button type="button" id="zoom-in-btn">图像放大</button>
                <button type="button" id="zoom-out-btn">图像缩小</button>
                <button type="button" id="preview-btn">切图预览</button>
            </div>
            <div class="center">
                <canvas id="main-canvas" width="500" height="500">不支持画布功能</canvas>
            </div>
            <div class="right">
                <h4>九宫格预览</h4>
                <div class="preview-grid" id="preview-container"></div>
                <button type="button" id="export-btn">导出九宫格</button>
            </div>
        </section>
        <footer class="bar">© 2025 九宫格切图工具</footer>
    </div>

    <script src="js/jjg.js"></script>
</body>

</html>
