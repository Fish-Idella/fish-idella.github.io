<svg
  width="1920"
  height="1080"
  viewBox="0 0 1920 1080"
  xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- 天空 -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#6136a4"/>
      <stop offset="33%"  stop-color="#b464a6"/>
      <stop offset="60%"  stop-color="#df9c9f"/>
      <stop offset="80%" stop-color="#ffe0a1"/>
      <stop offset="80%" stop-color="#7c858f"/>
      <stop offset="100%"  stop-color="#4661d9"/>
    </linearGradient>

    <!-- 海水 -->
    <linearGradient id="seaColor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2386e8"/>
      <stop offset="100%" stop-color="#325d8b"/>
    </linearGradient>

    <!-- 太阳光晕 -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%"  stop-color="#ffd89b" stop-opacity="0.6"/>
      <stop offset="60%"  stop-color="#ff9e5c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <!-- 水波纹滤镜 -->
    <filter id="waterRipple" x="-20%" y="-20%" width="140%" height="140%">
      <!-- 噪波：控制波纹形状 -->
      <feTurbulence
        type="turbulence"
        baseFrequency="0.015 0.05"
        numOctaves="2"
        seed="3"
        result="noise"/>

      <!-- 动画噪波，产生流动 -->
      <feTurbulence
        id="wave"
        type="turbulence"
        baseFrequency="0.015 0.05"
        numOctaves="2"
        seed="3">
        <animate
          attributeName="baseFrequency"
          dur="8s"
          values="0.015 0.05; 0.02 0.06; 0.015 0.05"
          repeatCount="indefinite"/>
      </feTurbulence>

      <!-- 位移映射：水平扭曲 -->
      <feDisplacementMap
        in="SourceGraphic"
        in2="wave"
        scale="40"
        xChannelSelector="R"
        yChannelSelector="G"/>
    </filter>

    <!-- 你的海水渐变 -->
    <linearGradient id="seaColor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2386e8"/>
      <stop offset="100%" stop-color="#325d8b"/>
    </linearGradient>

  </defs>

  <!-- 天空 -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>

  <!-- 太阳本体 -->
  <circle cx="960" cy="864" r="90" fill="#fff5cc"/>

  <!-- 阳光 -->
  <circle cx="960" cy="864" r="320" fill="url(#sunGlow)"/>

  <!-- 应用水波纹 -->
  <rect
    x="400"
    y="864"
    width="520"
    height="200"
    fill="url(#seaColor)"
    filter="url(#waterRipple)"/>

</svg>
