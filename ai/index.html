<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI API Chat</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="view">
    <div id="chat-view" class="view flex-vertical">
        <header class="top flex-horizontal">
            <button id="gotomain"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- 菜单（☰ / #gotomain） -->
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg></button>
            <span id="info" class="fill">未选择智能体</span>
            <button id="qijulu"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- 信息（ⓘ / #qijulu） -->
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg></button>
        </header>
        <div class="fill chat-message-output">
            <div id="image" class="view"><img src="./image/1.png"></div>
            <div id="message-list" class="view scroll-v">
                <div class="flex-horizontal chat-message-output-box hide" data-persona="assistant" data-index="0">
                    <div class="logo">@</div>
                    <div class="output">
                        <div class="chat-message">
                            <details class="chat-message-title">
                                <summary class="state">已完成</summary>
                                <div class="think"></div>
                            </details>
                            <div class="message"></div>
                        </div>
                        <div class="buttons flex-horizontal">
                            <div class="flex-horizontal branch align-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="hide"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <!-- 分支（分支 / class="select"） -->
                                    <line x1="6" y1="3" x2="6" y2="15"></line>
                                    <circle cx="18" cy="6" r="3"></circle>
                                    <circle cx="6" cy="18" r="3"></circle>
                                    <path d="M18 9a9 9 0 0 1-9 9"></path>
                                </svg>
                                <button type="button" class="previous" title="上一个"><svg
                                        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <!-- 上一个（&lt; / class="previous"） -->
                                        <polyline points="15 18 9 12 15 6"></polyline>
                                    </svg></button>
                                <button type="button" class="select" title="分支">1/5</button>
                                <button type="button" class="next" title="下一个"><svg xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <!-- 下一个（&gt; / class="next"） -->
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg></button>
                            </div>
                            <button type="button" class="remake" title="重说"><svg xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <!-- 重新生成（重新生成 / class="remake"） -->
                                    <path d="M23 4v6h-6"></path>
                                    <path d="M1 20v-6h6"></path>
                                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"></path>
                                    <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"></path>
                                </svg></button>
                            <button type="button" class="copy" title="复制"><svg xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <!-- 复制（复制 / class="copy"） -->
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg></button>
                            <button type="button" class="edit" title="编辑"><svg xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <!-- 编辑（编辑 / name="edit"） -->
                                    <path d="M17 3l4 4-7 7H10v-4l7-7z"></path>
                                    <path d="M4 20h16"></path>
                                </svg></button>
                            <button type="button" class="delete" title="删除"><svg xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <!-- 删除（删除 / name="delete", class="delete"） -->
                                    <path d="M3 6h18"></path>
                                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg></button>
                            <button type="button" class="usage" title="usage"><svg xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <!-- 量杯（用量 / class="usage"） -->
                                    <path
                                        d="M6 3h12v3c0 2.5-1 4.5-2 6s-2 3.5-2 6v3H10v-3c0-2.5-1-4.5-2-6s-2-3.5-2-6V3z">
                                    </path>
                                    <line x1="8" y1="9" x2="16" y2="9"></line>
                                    <line x1="9" y1="15" x2="15" y2="15"></line>
                                    <line x1="10" y1="3" x2="14" y2="3"></line>
                                </svg></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer class="flex-vertical chat-message-input" for="input-message">
            <textarea class="fill" id="input-message" placeholder="请输入消息..." enterkeyhint="send"></textarea>
            <div class="flex-horizontal" style="gap: 0.4rem;">
                <button type="file" accept="text/*,image/*"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <!-- 回形针（附件 / 文件上传） -->
                        <path
                            d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                        </path>
                    </svg></button>
                <button type="button" id="send"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <!-- 发送（发送 / #send） -->
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg></button>
            </div>
        </footer>
    </div>

    <div id="message-edit" class="view grid-vertical place-center overlay hide">
        <div class="dialog-content flex-vertical" data-name="assistant">
            <div>修改消息</div>
            <textarea name="message" class="fill" rows="5"></textarea>
            <div class="flex-horizontal">
                <button type="button" name="cancel">取消</button>
                <button type="button" name="save">保存</button>
                <button type="button" name="submit">提交</button>
            </div>
        </div>
    </div>

    <div id="drawer" class="view unselect overlay hide">
        <nav class="flex-vertical drawer-nav">
            <header class="flex-horizontal">
                <h1 class="fill unify">智能体</h1>
                <button id="add-agent" title="创建"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <!-- 添加智能体（添加智能体 / #add-agent） -->
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg></button>
            </header>
            <ul id="agent-list" class="fill unify">
                <li class="flex-horizontal"><span class="name fill">默认智能体</span><button name="edit"><svg
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <!-- 编辑（编辑 / name="edit"） -->
                            <path d="M17 3l4 4-7 7H10v-4l7-7z"></path>
                            <path d="M4 20h16"></path>
                        </svg></button><button name="delete"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <!-- 删除（删除 / name="delete", class="delete"） -->
                            <path d="M3 6h18"></path>
                            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg></button>
                </li>
            </ul>
        </nav>
    </div>

    <!-- 表单区域 -->
    <form id="login-view" class="view flex-vertical unselect justify-center align-center hide" style="gap: 1rem;">
        <!-- API URL 输入框 -->
        <input type="url" id="api-url" class="unify" placeholder="API URL"
            style="padding: 0.6rem; border: 1px solid #ddd; border-radius: 0.5rem; width: 90%; box-sizing: border-box;">

        <!-- API KEY 输入框 -->
        <input type="text" id="api-key" class="unify" placeholder="API KEY"
            style="padding: 0.6rem; border: 1px solid #ddd; border-radius: 0.5rem; width: 90%; box-sizing: border-box;">

        <div class="flex-horizontal" style="width: 90%;justify-content: space-between;gap: 1rem;">
            <select id="models" class="unify fill" disabled
                style="padding: 0.6rem; border: 1px solid #ddd; border-radius: 0.5rem; box-sizing: border-box; background-color: white;">
                <option value="">- 请先测试连接 -</option>
            </select>
            <button id="test-connect" class="unify" type="button"
                style="padding: 0.6rem; background-color: #4CAF50; color: white; border-radius: 0.5rem; cursor: pointer;">
                测试连接
            </button>
        </div>

        <input type="text" id="agent-name" class="unify" placeholder="智能体名称"
            style="padding: 0.6rem; border: 1px solid #ddd; border-radius: 0.5rem; width: 90%; box-sizing: border-box;">

        <textarea type="text" id="agent-prompt" class="unify" placeholder="提示词" rows="5"
            style="padding: 0.6rem; border: 1px solid #ddd; border-radius: 0.5rem; width: 90%; box-sizing: border-box;"></textarea>

        <div class="flex-horizontal" style="width: 90%;justify-content: space-between;gap: 1rem;">
            <button id="enter-chat" class="unify fill" disabled type="button"
                style="padding: 0.6rem; background-color: #2196F3; color: white; border-radius: 0.5rem;  cursor: pointer;">
                保存智能体
            </button>
            <button id="exit-edit" class="unify fill" type="button"
                style="padding: 0.6rem; background-color: #2196F3; color: white; border-radius: 0.5rem;  cursor: pointer;">
                退出编辑
            </button>
        </div>
    </form>


    <script src="./js/puset-3.0.0.js"></script>
    <script src="./js/puset.storage-1.0.1.js"></script>
    <script src="./js/ai.js"></script>
</body>

</html>
