<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .nav {
            position: absolute;
            width: 100%;
            height: 50px;
            display: flex;
            place-content: center;
            place-items: center;
            gap: 20px;
        }

        .nav label {
            position: relative;
            user-select: none;
            height: 40px;
            display: flex;
            flex-direction: row;
            place-content: center;
            place-items: center;
            cursor: pointer;
            padding: 0px 20px;
            border-radius: 20px;
        }
        
        .nav label:hover {
            background-color: rgba(120, 160, 220, 0.192);
        }

        .nav input[type="radio"] {
            display: none;
        }

        .slide {
            touch-action: none;
            pointer-events: none;
            position: absolute;
            width: anchor-size(width);
            height: anchor-size(height);
            background-color: rgba(0, 30, 255, 0.192);
            top: 5px;
            left: anchor(left);
            transition: all 0.3s ease;
            border-radius: 20px;
        }


        .nav:has(label:nth-child(1)>input[type="radio"]:checked)~.slide {
            position-anchor: --item1;
        }

        .nav:has(label:nth-child(2)>input[type="radio"]:checked)~.slide {
            position-anchor: --item2;
        }

        .nav:has(label:nth-child(3)>input[type="radio"]:checked)~.slide {
            position-anchor: --item3;
        }

        .nav:has(label:nth-child(4)>input[type="radio"]:checked)~.slide {
            position-anchor: --item4;
        }

        .nav:has(label:nth-child(5)>input[type="radio"]:checked)~.slide {
            position-anchor: --item5;
        }
    </style>
</head>

<body>
    <header>
        <div class="nav">
            <label style="anchor-name: --item1;"><input type="radio" name="nav" checked><span>Nav 1</span></label>
            <label style="anchor-name: --item2;"><input type="radio" name="nav"><span>Nav 2</span></label>
            <label style="anchor-name: --item3;"><input type="radio" name="nav"><span>Nav 3</span></label>
            <label style="anchor-name: --item4;"><input type="radio" name="nav"><span>Nav 4</span></label>
            <label style="anchor-name: --item5;"><input type="radio" name="nav"><span>Nav 5</span></label>
        </div>
        <div class="slide"></div>
    </header>
</body>

</html>
