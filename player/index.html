<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="css/index.css">
    <style>
        body {
            background-color: #101010;
            color: #efefef;
        }

        #app {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #a,
        #b,
        #c,
        #d {
            position: relative;
        }

        #a {
            background-color: rgb(0, 0, 0);
            color: #fff;
        }

        #b {
            /* background-color: rgb(22, 48, 48); */
            padding: 10px 0;
        }

        #c {
            /* background-color: rgb(44, 131, 44); */
        }

        #d {
            /* background-color: rgb(76, 103, 51); */
            max-width: 100vh;
            max-height: 100vh;
        }


        /* ========== 1. 手机场景：宽高比 ≤ 9/16，或平板竖屏（宽<高） ========== */
        @media (aspect-ratio: 9/16),
        (max-aspect-ratio: 9/16),
        (orientation: portrait) {

            /* 宽度≤500px 时生效 */
            @media (max-width: calc(56.25vh + 400px)) {

                #c,
                #d {
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    overflow: hidden;
                }

                #c {
                    display: none;
                }
            }


            /* 宽度>=500px 时生效 */
            @media (min-width: calc(56.25vh + 400px)) {

                #app {
                    display: flex;
                    flex-direction: row;
                }

                #c {
                    position: relative;
                    flex-grow: 1;
                }

                #d {
                    position: relative;
                    aspect-ratio: 9/16;
                }

            }

            #d:not(.portrait),
            #d.landscape {
                display: flex;
                flex-direction: column;
            }

            #d:not(.portrait)>#a,
            #d.landscape>#a {
                aspect-ratio: 16/9;
            }

            #d:not(.portrait)>#b,
            #d.landscape>#b {
                position: relative;
                flex-grow: 1;
            }

            #d.portrait>#a,
            #d.portrait>#b {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            #d.portrait>#b {
                display: none;
            }
        }


        /* ========== 2. PC场景：宽高比 ≥ 16/9，或平板横屏（宽>高） ========== */
        @media (aspect-ratio: 16/9),
        (min-aspect-ratio: 16/9),
        (orientation: landscape) {

            #app {
                display: flex;
                flex-direction: row;
            }

            #c {
                position: relative;
                width: 600px;
            }

            #d {
                position: relative;
                flex-grow: 1;
            }


            /* 宽度≤500px 时生效 */
            @media (max-width: calc(100vh + 600px)) {

                #d.portrait>#a,
                #d.portrait>#b {
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    overflow: hidden;
                }

                #d.portrait>#b {
                    display: none;
                }
            }

            /* 宽度>=500px 时生效 */
            @media (min-width: calc(100vh + 600px)) {

                #d.portrait>#a {
                    position: relative;
                    aspect-ratio: 9/16;
                }

                #d.portrait>#b {
                    flex-grow: 1;
                }

            }

            #d:not(.portrait),
            #d.landscape {
                display: flex;
                flex-direction: column;
            }

            #d:not(.portrait)>#a,
            #d.landscape>#a {
                aspect-ratio: 16/9;
            }

            #d:not(.portrait)>#b,
            #d.landscape>#b {
                position: relative;
                flex-grow: 1;
            }

            #d.portrait {
                display: flex;
                flex-direction: row;
            }
        }

        .match-parent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>

<body class="view flex-horizontal">
    <div>左侧按钮区</div>
    <div class="fill">
        <div id="app">
            <div id="d" data-class="portrait">
                <div id="a">
                    <div id="player-video-layer" class="video-layer grid-vertical center">
                        <video class="video fill" poster="/mediae/icons/0x300a0a0.png" muted="muted" preload="metadata"
                            src="https://localhost/av/Videos/Carib-052218-672-FHD/052218-672-carib-1080p.mp4" autoplay>
                            <track src="" kind="subtitles" srclang="zh" label="中文" default>
                            <span>你的浏览器不支持 HTML5 视频。</span>
                        </video>
                        <canvas class="fill danmu">你的浏览器不支持弹幕功能，请关闭弹幕。</canvas>
                        <div class="fill controls">
                            <div class="view flex-vertical layer-tooltip hide">
                                <div class="flex-horizontal tooltip">
                                    <img src="svg/volume.svg" alt="音量" />
                                    <span class="fill content">0</span>
                                </div>
                            </div>
                            <div class="bottom min">
                                <div class="progress-bar">
                                    <div class="inner progress-preview hide">
                                        <span class="progress-preview-time">00:00</span>
                                    </div>
                                    <div class="progress"></div>
                                </div>
                                <div class="buttons">
                                    <div class="left fc flex-horizontal">
                                        <div class="bt bt-play">
                                            <img data-a="svg/play.svg" data-b="svg/pause.svg" src="svg/play.svg"
                                                alt="播放/暂停">
                                            <div class="bpx-player-ctrl-time-label">
                                                <span class="bpx-player-ctrl-time-current">00:00</span>
                                                <span class="bpx-player-ctrl-time-divide">/</span>
                                                <span class="bpx-player-ctrl-time-duration">00:00</span>
                                            </div>
                                        </div>
                                        <div class="bt bt-playback-rate" title="倍速">
                                            <div class="bpx-player-ctrl-playbackrate-result">倍速</div>
                                            <ul class="inner bpx-player-ctrl-playbackrate-menu hide">
                                                <li class="bpx-player-ctrl-playbackrate-menu-item" data-value="3">3x
                                                </li>
                                                <li class="bpx-player-ctrl-playbackrate-menu-item" data-value="2">2.0x
                                                </li>
                                                <li class="bpx-player-ctrl-playbackrate-menu-item" data-value="1.5">1.5x
                                                </li>
                                                <li class="bpx-player-ctrl-playbackrate-menu-item" data-value="1.25">
                                                    1.25x
                                                </li>
                                                <li class="bpx-player-ctrl-playbackrate-menu-item bpx-state-active"
                                                    data-value="1">1.0x</li>
                                                <li class="bpx-player-ctrl-playbackrate-menu-item" data-value="0.75">
                                                    0.75x
                                                </li>
                                                <li class="bpx-player-ctrl-playbackrate-menu-item" data-value="0.5">0.5x
                                                </li>
                                                <li class="bpx-player-ctrl-playbackrate-menu-item" data-value="0.25">
                                                    0.25x
                                                </li>
                                            </ul>
                                        </div>
                                        <div class="bt bt-local-file" title="文件">
                                            <div class="bpx-player-ctrl-file-result">文件</div>
                                            <div class="inner dashboard flex-vertical hide">
                                                <div class="url-box flex-horizontal">
                                                    <input type="url" name="video"
                                                        value="https://localhost/av/Videos/Carib-052218-672-FHD/052218-672-carib-1080p.mp4"
                                                        class="unify fc" placeholder="请输入视频地址">
                                                </div>
                                                <div class="flex-horizontal">
                                                    <label for="play" type="button" class="bt-play">
                                                        <input type="button" name="video" id="play" value="播放">
                                                        <span>播放</span>
                                                    </label>
                                                    <label for="file" type="file">
                                                        <input type="file" name="video" id="file" accept="video/*">
                                                        <span>本地视频</span>
                                                    </label>
                                                    <label for="stop" type="button">
                                                        <input type="button" name="video" id="stop" value="退出播放">
                                                        <span>退出播放</span>
                                                    </label>
                                                    <label for="close" type="button">
                                                        <input type="button" name="video" id="close" value="关闭">
                                                        <span>关闭</span>
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="right">
                                        <div class="bt bt-volume" title="音量">
                                            <div class="inner volume-box flex-vertical hide">
                                                <div class="volume-value">0</div>
                                                <div class=" flex-vertical fc volume-bar" data-value="0" data-max="100">
                                                    <div class="view thumb">
                                                        <div class="thumb-dot" title="音量滑块"></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <img data-a="svg/volume.svg" data-b="svg/volume.svg" src="svg/muted.svg"
                                                alt="音量">
                                        </div>
                                        <div class="bt bt-fullscreen" title="全屏">
                                            <img id="fullscreen" data-a="svg/separate.svg" data-b="svg/combined.svg"
                                                src="svg/separate.svg" alt="全屏">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="b">
                </div>
            </div>
            <div id="c">网页其他展示容器C</div>
        </div>
    </div>
    <script type="text/javascript" src="/js/puset/interpreter.js"></script>
    <script type="text/javascript" src="js/index.js"></script>
</body>

</html>
